<!DOCTYPE html>
<html>
	<head>
		@include '../layout/head.html'
	</head>
	<body>
		@include '../layout/header.html'

		<div class="content">
			@include '../layout/repo_menu.html'

			<a class="back-link" href="/@repo.user_name/@repo.name/settings/webhooks">&larr; %webhook_back</a>

			<h1 class="settings-title">%webhook_new</h1>

			<form method="post" action="/@repo.user_name/@repo.name/settings/webhooks" class="webhook-form">
				<div class="field">
					<label>%webhook_url</label>
					<input type="url" name="url" placeholder="https://example.com/hook" required>
				</div>
				<div class="field">
					<label>%webhook_secret</label>
					<input type="text" name="secret" autocomplete="off">
					<p class="field-hint">%webhook_secret_hint</p>
				</div>
				<div class="field">
					<label>%webhook_events</label>
					<label class="checkbox"><input type="checkbox" name="event_push" checked> %webhook_event_push</label>
					<label class="checkbox"><input type="checkbox" name="event_issue" checked> %webhook_event_issue</label>
					<label class="checkbox"><input type="checkbox" name="event_pr" checked> %webhook_event_pr</label>
					<label class="checkbox"><input type="checkbox" name="event_comment" checked> %webhook_event_comment</label>
					<label class="checkbox"><input type="checkbox" name="event_release" checked> %webhook_event_release</label>
				</div>
				<button type="submit" class="settings-form__submit">%webhook_create</button>
			</form>
		</div>

		@include '../layout/footer.html'
	</body>
</html>
