<!DOCTYPE html>
<html>
<head>
	@include 'layout/head.html'
	<meta http-equiv="refresh" content="2">
</head>
<body>
		@include 'layout/header.html'

<div class="content">
	<div class="clone-status">
		<p>%repo_being_cloned_plz_wait</p>
		@if clone_url != ''
			<p class="clone-status-url">
				%repo_being_cloned_clone_url <code>@clone_url</code>
			</p>
		@end
		@if clone_progress != ''
			<pre class="clone-status-log">@clone_progress</pre>
		@else
			<img width=200 src='/assets/circular_progress_bar.gif'>
		@end
	</div>
</div>


@include 'layout/footer.html'
</body>
</html>
