<!DOCTYPE html>
<html>
	<head>
		@include 'layout/head.html'
	</head>
	<body>
		@include 'layout/header.html'

		<div class="content">
			<h1>%twofa_title</h1>
			<p>%twofa_login_prompt</p>

			.form-error {
				@ctx.form_error
			}

			<div class="form">
				<form method='post' action='/login/2fa'>
					<div class="field">
						<input type='text' name='code' placeholder='%twofa_code' pattern='[0-9]*' inputmode='numeric' required autofocus>
					</div>
					<div class="field">
						<input type='submit' value='%twofa_login_button'>
					</div>
				</form>
			</div>
		</div>

		@include 'layout/footer.html'
	</body>
</html>
