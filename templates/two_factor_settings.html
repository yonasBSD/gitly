<!DOCTYPE html>
<html>
	<head>
		@include 'layout/head.html'
	</head>
	<body>
		@include 'layout/header.html'

		<div class="content">
			<h1>%twofa_title</h1>

			@if enabled
				<p class="twofa-status twofa-status--on">%twofa_status_enabled</p>
				<form method='post' action='/@username/settings/2fa/disable'>
					<button type='submit' class='pr-action pr-action--close'>%twofa_disable</button>
				</form>
			@else
				<p>%twofa_setup_intro</p>
				<p class="twofa-secret"><strong>%twofa_secret</strong> <code>@secret</code></p>
				<p class="twofa-uri"><a href="@provisioning_uri">@provisioning_uri</a></p>
				<form method='post' action='/@username/settings/2fa/enable' class="form">
					<div class="field">
						<input type='text' name='code' placeholder='%twofa_code' pattern='[0-9]*' inputmode='numeric' required>
					</div>
					<div class="field">
						<button type='submit' class='settings-form__submit'>%twofa_verify</button>
					</div>
				</form>
			@end
		</div>

		@include 'layout/footer.html'
	</body>
</html>
